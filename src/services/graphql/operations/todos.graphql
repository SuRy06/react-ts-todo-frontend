query Todos($skip: Int!, $take: Int!, $statuses: [TodoStatus!]) {
  todos(skip: $skip, take: $take, statuses: $statuses) {
    items {
      createdAt
      id
      name
      status
      updatedAt
    }
    totalCount
  }
}

mutation CreateTodo($name: String!) {
  createTodo(createTodoInput: { name: $name }) {
    id
    name
    status
    createdAt
    updatedAt
  }
}

mutation UpdateTodoStatus($id: String!, $status: TodoStatus!) {
  updateTodo(updateTodoInput: { id: $id, status: $status }) {
    id
    name
    status
    createdAt
    updatedAt
  }
}
